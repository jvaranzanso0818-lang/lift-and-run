<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lift and Run</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #121212;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 28px 16px 60px;
  }

  .app { max-width: 580px; margin: 0 auto; }

  .app-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 24px;
  }

  .app-title .t-lift { color: #ffffff; }
  .app-title .t-sep  { color: #ffffff; margin: 0 7px; }
  .app-title .t-run  { color: #ffffff; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: #0e0e11;
    border: 1px solid #2c2c2c;
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
  }

  .stat-label {
    font-size: 10px;
    color: #c6c6c7;
    letter-spacing: 0.7px;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-sub {
    font-size: 10px;
    color: #b9b9bb;
    margin-top: 5px;
  }

  .streak-day .stat-value  { color: #ffffff; }
  .streak-week .stat-value { color: #ffffff; }
  .total-logs .stat-value  { color: #ffffff; }

  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .month-label { font-size: 15px; font-weight: 600; color: #e2e8f0; }

  .nav-btn {
    background: #0e0e11;
    border: 1px solid #1a1a20;
    color: #ffffff;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }

  .nav-btn:hover { background: #141418; color: #e2e8f0; }

  .weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }

  .weekday {
    text-align: center;
    font-size: 10px;
    color: #d2d2d3;
    padding: 4px 0;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    background: #0e0e11;
    border: 1px solid #acacad;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 500;
    color: #bebec2;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.15s;
    user-select: none;
  }

  .cal-day:hover         { transform: scale(1.06); border-color: #2a2d3a; color: #64748b; }
  .cal-day.empty         { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.empty:hover   { transform: none; }
  .cal-day.today         { border-color: #ffffff !important; color: #a5b4fc; }
  .cal-day.lift          { background: #0437b8; border-color: #1d4ed8; color: #93c5fd; }
  .cal-day.run           { background: #aa0707; border-color: #b91c1c; color: #fca5a5; }
  .cal-day.rest          { background: #111116; border-color: #1e2028; color: #374151; }
  .cal-day.future        { opacity: 0.25; cursor: not-allowed; }
  .cal-day.future:hover  { transform: none; }

  .section-title {
    font-size: 14px;
    color: #9f9fa1;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin: 30px 0 10px;
  }

  .heatmap-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }

  .hm-tab {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid #1a1a20;
    background: transparent;
    color: #9d9d9e;
    cursor: pointer;
    transition: all 0.15s;
  }

  .hm-tab.active { background: #141418; color: #64748b; border-color: #2a2d3a; }
  .hm-tab:hover  { color: #475569; }

  .heatmap-wrap { overflow-x: auto; padding-bottom: 6px; }

  .heatmap-grid {
    display: grid;
    grid-template-rows: repeat(7, 11px);
    grid-auto-flow: column;
    gap: 3px;
    width: max-content;
  }

  .hm-cell {
    width: 11px;
    height: 11px;
    border-radius: 2px;
    cursor: default;
    transition: transform 0.08s;
    position: relative;
  }

  .hm-cell:hover { transform: scale(1.5); z-index: 2; }

  .heatmap-legend {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: #82838b;
  }

  .legend-box {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 240px;
    overflow-y: auto;
  }

  .log-list::-webkit-scrollbar { width: 3px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: #1a1a20; border-radius: 2px; }

  .log-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #0e0e11;
    border: 1px solid #0f0d0d;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 13px;
  }

  .log-date { color: #9b9ca1; flex: 1; }
  .log-type { font-weight: 600; }
  .log-type.lift { color: #1b6ed3; }
  .log-type.run  { color: #d11717; }
  .log-type.rest { color: #5e6063; }

  .log-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .log-dot.lift { background: #2563eb; }
  .log-dot.run  { background: #dc2626; }
  .log-dot.rest { background: #2a2d3a; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal {
    background: #0e0e11;
    border: 1px solid #1a1a20;
    border-radius: 16px;
    padding: 22px 20px 18px;
    width: 260px;
  }

  .modal-date  { font-size: 12px; color: #2e3245; margin-bottom: 3px; }
  .modal-title { font-size: 17px; font-weight: 600; color: #f1f5f9; margin-bottom: 18px; }

  .modal-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 12px;
  }

  .modal-opt {
    padding: 12px 16px;
    border-radius: 9px;
    border: 1px solid transparent;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    text-align: left;
    transition: transform 0.1s;
  }

  .modal-opt:hover  { transform: scale(1.02); }
  .modal-opt:active { transform: scale(0.97); }

  .opt-lift { background: #0c2460; border-color: #1d4ed8; color: #93c5fd; }
  .opt-run  { background: #550e0e; border-color: #b91c1c; color: #fca5a5; }
  .opt-rest { background: #111116; border-color: #1e2028; color: #374151; }

  .modal-cancel {
    width: 100%;
    padding: 9px;
    background: transparent;
    border: 1px solid #1a1a20;
    color: #a0a3b1;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .modal-cancel:hover { background: #141418; color: #475569; }

  @media (max-width: 400px) {
    .cal-day { font-size: 11px; }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="app-title">
    <span class="t-lift">Lift</span><span class="t-sep">&</span><span class="t-run">Run</span>
  </div>

  <div class="stats-row">
    <div class="stat-card streak-day">
      <div class="stat-label">Day Streak</div>
      <div class="stat-value" id="dayStreak">0</div>
      <div class="stat-sub">consecutive days</div>
    </div>
    <div class="stat-card streak-week">
      <div class="stat-label">Week Streak</div>
      <div class="stat-value" id="weekStreak">0</div>
      <div class="stat-sub">active weeks</div>
    </div>
    <div class="stat-card total-logs">
      <div class="stat-label">Total Logs</div>
      <div class="stat-value" id="totalLogs">0</div>
      <div class="stat-sub">sessions logged</div>
    </div>
  </div>

  <div class="calendar-header">
    <button class="nav-btn" id="prevBtn">&#8249;</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="nav-btn" id="nextBtn">&#8250;</button>
  </div>

  <div class="weekday-row">
    <div class="weekday">Su</div><div class="weekday">Mo</div><div class="weekday">Tu</div>
    <div class="weekday">We</div><div class="weekday">Th</div><div class="weekday">Fr</div>
    <div class="weekday">Sa</div>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>

  <div class="section-title">Activity Heatmap</div>
  <div class="heatmap-tabs">
    <button class="hm-tab active" data-days="90">90 days</button>
    <button class="hm-tab" data-days="180">6 months</button>
    <button class="hm-tab" data-days="365">1 year</button>
  </div>
  <div class="heatmap-wrap">
    <div class="heatmap-grid" id="heatmapGrid"></div>
  </div>
  <div class="heatmap-legend">
    <div class="legend-item">
      <div class="legend-box" style="background:#0e0e11;border:1px solid #1a1a20;"></div> None
    </div>
    <div class="legend-item">
      <div class="legend-box" style="background:#1d4ed8;"></div> Lift
    </div>
    <div class="legend-item">
      <div class="legend-box" style="background:#dc2626;"></div> Run
    </div>
    <div class="legend-item">
      <div class="legend-box" style="background:#1e2028;"></div> Rest
    </div>
  </div>

  <div class="section-title" style="margin-top:30px;">Past Logs</div>
  <div class="log-list" id="logList"></div>

</div>

<script>
const STORAGE_KEY = 'fitness_tracker_data';
let data = {};
let viewYear, viewMonth;
let heatDays = 90;

function today() {
  const d = new Date();
  return fmt(d.getFullYear(), d.getMonth()+1, d.getDate());
}

function fmt(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function load() {
  try { data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { data = {}; }
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function calcDayStreak() {
  let streak = 0;
  const d = new Date(); d.setHours(0,0,0,0);
  while (true) {
    const k = fmt(d.getFullYear(), d.getMonth()+1, d.getDate());
    const v = data[k];
    if (v === 'lift' || v === 'run') { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function calcWeekStreak() {
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  let streak = 0;
  while (true) {
    let active = false;
    for (let i = 0; i < 7; i++) {
      const dd = new Date(d); dd.setDate(d.getDate()+i);
      const k = fmt(dd.getFullYear(), dd.getMonth()+1, dd.getDate());
      if (data[k] === 'lift' || data[k] === 'run') { active = true; break; }
    }
    if (active) { streak++; d.setDate(d.getDate()-7); }
    else break;
  }
  return streak;
}

function updateStats() {
  document.getElementById('dayStreak').textContent = calcDayStreak();
  document.getElementById('weekStreak').textContent = calcWeekStreak();
  document.getElementById('totalLogs').textContent = Object.keys(data).length;
}

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  document.getElementById('monthLabel').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const todayStr = today();
  const t = new Date(); t.setHours(0,0,0,0);

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key = fmt(viewYear, viewMonth+1, d);
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    if (key === todayStr) el.classList.add('today');
    if (data[key]) el.classList.add(data[key]);
    const cellDate = new Date(viewYear, viewMonth, d); cellDate.setHours(0,0,0,0);
    if (cellDate > t) {
      el.classList.add('future');
    } else {
      el.addEventListener('click', () => openModal(key));
    }
    grid.appendChild(el);
  }
}

function renderHeatmap() {
  const grid = document.getElementById('heatmapGrid');
  grid.innerHTML = '';
  const end = new Date(); end.setHours(0,0,0,0);
  const start = new Date(end);
  start.setDate(start.getDate() - (heatDays - 1));
  const startDow = start.getDay();
  for (let pad = 0; pad < startDow; pad++) {
    const el = document.createElement('div');
    el.className = 'hm-cell';
    el.style.background = 'transparent';
    grid.appendChild(el);
  }
  const cur = new Date(start);
  while (cur <= end) {
    const key = fmt(cur.getFullYear(), cur.getMonth()+1, cur.getDate());
    const v = data[key];
    const el = document.createElement('div');
    el.className = 'hm-cell';
    if (!v)            el.style.background = '#0e0e11';
    else if (v==='lift') el.style.background = '#1d4ed8';
    else if (v==='run')  el.style.background = '#dc2626';
    else                 el.style.background = '#1e2028';
    const dateStr = cur.toLocaleDateString('en-US', {month:'short', day:'numeric'});
    el.title = v ? `${dateStr}: ${v.charAt(0).toUpperCase()+v.slice(1)}` : dateStr;
    grid.appendChild(el);
    cur.setDate(cur.getDate()+1);
  }
}

function renderLogs() {
  const list = document.getElementById('logList');
  list.innerHTML = '';
  const keys = Object.keys(data).sort().reverse();
  if (!keys.length) {
    list.innerHTML = '<div style="text-align:center;padding:24px;color:#252836;font-size:13px;">No logs yet — click a day to start.</div>';
    return;
  }
  keys.forEach(k => {
    const v = data[k];
    const item = document.createElement('div');
    item.className = 'log-item';
    const d = new Date(k+'T00:00:00');
    const dateStr = d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});
    item.innerHTML = `
      <div class="log-dot ${v}"></div>
      <span class="log-date">${dateStr}</span>
      <span class="log-type ${v}">${v.charAt(0).toUpperCase()+v.slice(1)}</span>
    `;
    list.appendChild(item);
  });
}

function renderAll() {
  renderCalendar();
  renderHeatmap();
  renderLogs();
  updateStats();
}

let pendingKey = null;

function openModal(key) {
  pendingKey = key;
  const d = new Date(key+'T00:00:00');
  const dateStr = d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-date">${dateStr}</div>
      <div class="modal-title">Log Activity</div>
      <div class="modal-options">
        <button class="modal-opt opt-lift" data-type="lift">Lift</button>
        <button class="modal-opt opt-run"  data-type="run">Run</button>
        <button class="modal-opt opt-rest" data-type="rest">Rest</button>
      </div>
      <button class="modal-cancel">Cancel</button>
    </div>
  `;
  overlay.querySelectorAll('.modal-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      data[pendingKey] = btn.dataset.type;
      save();
      document.body.removeChild(overlay);
      renderAll();
    });
  });
  overlay.querySelector('.modal-cancel').addEventListener('click', () => document.body.removeChild(overlay));
  overlay.addEventListener('click', e => { if (e.target === overlay) document.body.removeChild(overlay); });
  document.body.appendChild(overlay);
}

function init() {
  load();
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();

  document.getElementById('prevBtn').addEventListener('click', () => {
    viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  });

  document.querySelectorAll('.hm-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.hm-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      heatDays = parseInt(tab.dataset.days);
      renderHeatmap();
    });
  });

  renderAll();
}

init();
</script>
</body>
</html>
